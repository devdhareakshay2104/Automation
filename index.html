<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AWS Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:40px;
width:500px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
color:#0077cc;
margin-bottom:15px;
}

h2{
color:#333;
margin-bottom:20px;
}

p{
color:#555;
line-height:1.6;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#0077cc;
color:white;
text-decoration:none;
border-radius:6px;
transition:.3s;
}

.btn:hover{
background:#005fa3;
}

footer{
margin-top:25px;
color:#777;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Welcome to My Website</h1>

<h2>Hosted on AWS EC2</h2>

<p>
This website is successfully deployed using Jenkins CI/CD Pipeline,
GitHub Repository, Amazon EC2 and Nginx Web Server.
</p>

<a href="#" class="btn">Learn More</a>

<footer>
© 2026 Akshay Devdhare | Jenkins CI/CD Pipeline
</footer>

</div>

</body>
</html>
